# ============================================================
# CI - Continuous Integration
# ============================================================
# Chạy kiểm tra chất lượng code cho cả Frontend và Backend
# khi có push lên main hoặc tạo Pull Request.
#
# Bao gồm:
#   - Lint (eslint)
#   - TypeScript typecheck
#   - Unit tests (backend)
#   - Build kiểm tra
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── BACKEND CI ──────────────────────────────────────────
  backend:
    name: Backend (Lint + Test + Build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Unit tests
        run: npm test
        env:
          NODE_ENV: test

      - name: 🏗️ Build
        run: npm run build

  # ─── FRONTEND CI ─────────────────────────────────────────
  frontend:
    name: Frontend (Lint + Typecheck + Build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tutorbackend-2e8a.onrender.com/api' }}

      - name: 🔎 TypeScript typecheck
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tutorbackend-2e8a.onrender.com/api' }}

      - name: 🏗️ Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tutorbackend-2e8a.onrender.com/api' }}
