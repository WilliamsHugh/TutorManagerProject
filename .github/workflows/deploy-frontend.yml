# ============================================================
# Deploy Frontend → Vercel
# ============================================================
# Triển khai frontend lên Vercel khi có push lên main.
# Yêu cầu CI phải pass trước khi deploy.
#
# Cách thiết lập:
#   1. Vào Vercel Dashboard → Project → Settings → Git
#   2. Tại mục "Deploy Hooks", tạo hook mới tên "GitHub CI"
#   3. Copy URL và set vào GitHub Secret: VERCEL_DEPLOY_HOOK
#
#   Hoặc dùng Vercel GitHub App (tích hợp sẵn):
#   Vercel tự động deploy khi code được push lên main.
#   Workflow này chạy song song để deploy sau khi CI pass.
# ============================================================

name: Deploy Frontend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🚀 Deploy to Vercel
        run: |
          vercel deploy \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://tutorbackend-2e8a.onrender.com/api' }} 2>&1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
